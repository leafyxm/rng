<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack Online | leafyrng.com</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>♠ Blackjack Online ♥</h1>

<div class="panel" id="lobby">
  <div>Your name</div>
  <input id="nameInput" placeholder="Enter your name" maxlength="16">

  <button id="createBtn">Create Room</button>

  <div class="divider">— or —</div>

  <input id="codeInput" placeholder="Enter room code" maxlength="4" style="text-transform:uppercase;">
  <button id="joinBtn" class="secondary">Join Room</button>

  <div id="lobbyMsg" class="lobby-msg"></div>
</div>

<div class="panel" id="waitingPanel" style="display:none;">
  <div>Share this code with your opponent</div>
  <div class="code-display" id="codeDisplay"></div>
  <button id="copyBtn" class="secondary">Copy Code</button>
  <div class="status" id="waitingStatus">Waiting for opponent to join...</div>
</div>

<div class="table" id="gameTable">
  <div class="room-bar">
    <span>Room: <b id="roomCodeShow"></b></span>
    <span>Round <b id="roundShow">1</b></span>
    <button class="badge secondary" id="leaveBtn">Leave</button>
  </div>

  <div class="area">
    <div class="area-label"><span>Dealer</span><span id="dealerTotal"></span></div>
    <div class="cards" id="dealerCards"></div>
  </div>

  <div class="area" id="player1Area">
    <div class="area-label"><span id="player1Name"></span><span id="player1Total"></span></div>
    <div class="cards" id="player1Cards"></div>
  </div>

  <div class="area" id="player2Area">
    <div class="area-label"><span id="player2Name"></span><span id="player2Total"></span></div>
    <div class="cards" id="player2Cards"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="controls" id="actionRow">
    <button id="hitBtn">Hit</button>
    <button id="standBtn">Stand</button>
  </div>

  <div class="controls" id="againRow" style="display:none;">
    <button id="againBtn">Play Again</button>
  </div>
</div>

<script src="client.js"></script>
</body>
</html>
